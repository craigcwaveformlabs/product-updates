<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <style>
      .label { font: 700 18px 'Arial', sans-serif; fill: #0f2e6e; }
      .small { font: 600 14px 'Arial', sans-serif; fill: #0f2e6e; }
    </style>
  </defs>

  <!-- canvas boundary -->
  <rect x="1" y="1" width="1198" height="628" fill="none" stroke="#0f2e6e" stroke-width="2" />

  <!-- edge risk zones -->
  <rect x="0" y="0" width="180" height="630" fill="#ff4d4f" fill-opacity="0.08" />
  <rect x="1020" y="0" width="180" height="630" fill="#ff4d4f" fill-opacity="0.08" />
  <rect x="0" y="0" width="1200" height="130" fill="#ff4d4f" fill-opacity="0.08" />
  <rect x="0" y="500" width="1200" height="130" fill="#ff4d4f" fill-opacity="0.08" />

  <!-- critical safe area -->
  <rect x="180" y="130" width="840" height="370" fill="#22c55e" fill-opacity="0.08" stroke="#16a34a" stroke-width="3" stroke-dasharray="10 8" />

  <!-- focal center marker -->
  <line x1="600" y1="0" x2="600" y2="630" stroke="#1a4a96" stroke-width="2" stroke-dasharray="6 6" />
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#1a4a96" stroke-width="2" stroke-dasharray="6 6" />
  <circle cx="600" cy="315" r="10" fill="#1a4a96" fill-opacity="0.18" stroke="#1a4a96" stroke-width="2" />

  <!-- labels -->
  <text x="16" y="30" class="label">1200 x 630 overlay</text>
  <text x="16" y="52" class="small">Keep key subject/logo/text inside green box</text>
  <text x="16" y="74" class="small">Avoid critical content in red edge zones</text>

  <text x="192" y="122" class="small">Critical safe area: x 180..1020, y 130..500</text>
  <text x="612" y="306" class="small">Focal center (600, 315)</text>
</svg>
