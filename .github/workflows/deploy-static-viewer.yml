name: Deploy Static Viewer to GitHub Pages

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1-5"
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync Notion roadmap content
        if: ${{ env.NOTION_TOKEN != '' && env.NOTION_DATABASE_ID != '' }}
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: npm run content:sync:notion

      - name: Commit synced imported updates
        if: ${{ env.NOTION_TOKEN != '' && env.NOTION_DATABASE_ID != '' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain content/imported-updates)" ]]; then
            git add content/imported-updates
            git commit -m "chore(content): sync notion roadmap"
            git push
          else
            echo "No imported updates changes to commit."
          fi

      - name: Build static viewer
        env:
          STATIC_EXPORT: "true"
          NEXT_PUBLIC_VIEWER_ONLY: "true"
        run: npm run build:static

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
